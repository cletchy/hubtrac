<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>

  <!-- Tailwind safelist must appear BEFORE the CDN script -->
  <script>
    tailwind.config = {
      safelist: [
        'bg-blue-500','bg-green-500','bg-purple-500','bg-red-500','bg-orange-500','bg-pink-500',
        'bg-blue-100','bg-green-100','bg-purple-100','bg-red-100','bg-orange-100','bg-pink-100',
        'ring-blue-400','ring-green-400','ring-purple-400','ring-red-400','ring-orange-400','ring-pink-400',
      ]
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Import map: resolves bare specifiers for the module script below -->
  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client",
      "htm":              "https://esm.sh/htm@3"
    }
  }
  </script>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement, useState, useCallback, useEffect, useRef } from 'react'
import { createRoot } from 'react-dom/client'
import htm from 'htm'
const html = htm.bind(createElement)

// ── helpers ──────────────────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2)
const todayStr = () => new Date().toISOString().slice(0, 10)

// ── color config ──────────────────────────────────────────────────────────────
const COLOR_OPTIONS = [
  { key: 'blue',   bg: 'bg-blue-500',   accent: 'bg-blue-100',   ring: 'ring-blue-400' },
  { key: 'green',  bg: 'bg-green-500',  accent: 'bg-green-100',  ring: 'ring-green-400' },
  { key: 'purple', bg: 'bg-purple-500', accent: 'bg-purple-100', ring: 'ring-purple-400' },
  { key: 'red',    bg: 'bg-red-500',    accent: 'bg-red-100',    ring: 'ring-red-400' },
  { key: 'orange', bg: 'bg-orange-500', accent: 'bg-orange-100', ring: 'ring-orange-400' },
  { key: 'pink',   bg: 'bg-pink-500',   accent: 'bg-pink-100',   ring: 'ring-pink-400' },
]

const COLOR_HEX = {
  blue: '#3b82f6', green: '#22c55e', purple: '#a855f7',
  red: '#ef4444',  orange: '#f97316', pink: '#ec4899',
}

const getColorMeta = (color) => COLOR_OPTIONS.find(c => c.key === color) ?? COLOR_OPTIONS[0]

// ── duration helpers ──────────────────────────────────────────────────────────
function getDurationMinutes(habit) {
  if (!habit.startTime || !habit.endTime) return 0
  const [sh, sm] = habit.startTime.split(':').map(Number)
  const [eh, em] = habit.endTime.split(':').map(Number)
  const diff = eh * 60 + em - (sh * 60 + sm)
  return diff > 0 ? diff : 0
}

function formatDuration(minutes) {
  if (!minutes) return ''
  const h = Math.floor(minutes / 60), m = minutes % 60
  if (!h) return `${m}m`
  if (!m) return `${h}h`
  return `${h}h ${m}m`
}

// ── streak helpers ────────────────────────────────────────────────────────────
function getStreak(habit) {
  const set = new Set(habit.completions)
  const cursor = new Date()
  if (!set.has(todayStr())) cursor.setDate(cursor.getDate() - 1)
  let streak = 0
  while (true) {
    const d = cursor.toISOString().slice(0, 10)
    if (!set.has(d)) break
    streak++
    cursor.setDate(cursor.getDate() - 1)
  }
  return streak
}

const isCompletedToday = (habit) => habit.completions.includes(todayStr())

// ── localStorage ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'habit-tracker-habits'
const loadHabits = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]') } catch { return [] } }
const saveHabits = (h) => localStorage.setItem(STORAGE_KEY, JSON.stringify(h))

// ── useHabits hook ────────────────────────────────────────────────────────────
function useHabits() {
  const [habits, setHabits] = useState(loadHabits)

  const update = useCallback((next) => { setHabits(next); saveHabits(next) }, [])

  const addHabit = useCallback((name, color, startTime, endTime) => {
    update([...habits, { id: uid(), name: name.trim(), color, startTime, endTime, createdAt: new Date().toISOString(), completions: [] }])
  }, [habits, update])

  const deleteHabit = useCallback((id) => update(habits.filter(h => h.id !== id)), [habits, update])

  const toggleCompletion = useCallback((id) => {
    const today = todayStr()
    update(habits.map(h => h.id !== id ? h : {
      ...h,
      completions: h.completions.includes(today)
        ? h.completions.filter(d => d !== today)
        : [...h.completions, today]
    }))
  }, [habits, update])

  const clearAll = useCallback(() => update([]), [update])

  return { habits, addHabit, deleteHabit, toggleCompletion, clearAll }
}

// ── StatCard ──────────────────────────────────────────────────────────────────
function StatCard({ label, value, sub, icon }) {
  return html`
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <p className="text-sm text-gray-500 mb-1">${label}</p>
      <p className="text-3xl font-bold text-gray-800">
        ${icon && html`<span className="mr-1">${icon}</span>`}${value}
      </p>
      <p className="text-xs text-gray-400 mt-1">${sub}</p>
    </div>
  `
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ habits }) {
  const total = habits.length
  const doneCount = habits.filter(isCompletedToday).length
  const bestStreak = habits.reduce((m, h) => Math.max(m, getStreak(h)), 0)
  const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0
  return html`
    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <${StatCard} label="Total Habits" value=${total} sub="being tracked" />
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <p className="text-sm text-gray-500 mb-1">Completed Today</p>
        <p className="text-3xl font-bold text-gray-800">
          ${doneCount}<span className="text-lg font-normal text-gray-400"> / ${total}</span>
        </p>
        <div className="mt-3 h-2 bg-gray-100 rounded-full overflow-hidden">
          <div className="h-full bg-emerald-400 rounded-full transition-all duration-500" style=${{ width: `${pct}%` }} />
        </div>
        <p className="text-xs text-gray-400 mt-1">${pct}% done</p>
      </div>
      <${StatCard} label="Best Current Streak" value=${bestStreak} sub=${bestStreak === 1 ? 'day' : 'days'} icon="🔥" />
    </div>
  `
}

// ── HabitCard ─────────────────────────────────────────────────────────────────
function HabitCard({ habit, onToggle, onDelete }) {
  const { bg, accent } = getColorMeta(habit.color)
  const streak = getStreak(habit)
  const done = isCompletedToday(habit)
  const dur = getDurationMinutes(habit)
  const durLabel = formatDuration(dur)
  return html`
    <div className=${`relative flex items-center gap-4 rounded-2xl border border-gray-100 shadow-sm overflow-hidden bg-white p-4 transition-all ${done ? 'opacity-90' : ''}`}>
      <div className=${`absolute left-0 top-0 bottom-0 w-1.5 ${bg}`} />
      <button
        onClick=${() => onToggle(habit.id)}
        className=${`ml-2 flex-shrink-0 w-10 h-10 rounded-full border-2 flex items-center justify-center transition-all ${done ? `${bg} border-transparent text-white` : 'border-gray-300 hover:border-gray-400 bg-white text-transparent'}`}
      >
        <svg className="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
          <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
        </svg>
      </button>
      <div className="flex-1 min-w-0">
        <p className=${`font-semibold text-gray-800 truncate ${done ? 'line-through text-gray-400' : ''}`}>
          ${habit.name}
        </p>
        <div className="flex items-center gap-2 flex-wrap mt-1">
          ${habit.startTime && habit.endTime && html`
            <span className="text-xs text-gray-400">
              ${habit.startTime} – ${habit.endTime}
              ${durLabel && html`<span className="mx-1 text-gray-300">·</span>${durLabel}`}
            </span>
          `}
          ${streak > 0 && html`
            <span className=${`inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full ${accent} text-gray-700`}>
              🔥 ${streak} day${streak !== 1 ? 's' : ''}
            </span>
          `}
          ${streak === 0 && !habit.startTime && html`
            <span className="text-xs text-gray-400">Start your streak today</span>
          `}
        </div>
      </div>
      <button
        onClick=${() => onDelete(habit.id)}
        className="flex-shrink-0 flex items-center gap-1 text-xs font-medium text-gray-400 hover:text-red-500 hover:bg-red-50 px-2.5 py-1.5 rounded-lg transition-colors"
      >
        <svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" />
        </svg>
        Remove
      </button>
    </div>
  `
}

// ── AddHabitModal ─────────────────────────────────────────────────────────────
function AddHabitModal({ habits, onAdd, onClose }) {
  const [name, setName] = useState('')
  const [color, setColor] = useState('blue')
  const [startTime, setStartTime] = useState(() => {
    const n = new Date()
    return `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`
  })
  const [endTime, setEndTime] = useState(() => {
    const n = new Date()
    return `${((n.getHours()+1)%24).toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`
  })
  const inputRef = useRef(null)
  useEffect(() => { inputRef.current?.focus() }, [])

  // Auto-match color when name matches an existing habit
  useEffect(() => {
    const match = habits.find(h => h.name.toLowerCase() === name.trim().toLowerCase())
    if (match) setColor(match.color)
  }, [name, habits])
  const timeValid = startTime < endTime
  const canSubmit = name.trim() && timeValid

  function handleSubmit(e) {
    e.preventDefault()
    if (!canSubmit) return
    onAdd(name.trim(), color, startTime, endTime)
  }

  return html`
    <div
      className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
      onClick=${(e) => { if (e.target === e.currentTarget) onClose() }}
    >
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 p-6">
        <h2 className="text-lg font-semibold text-gray-800 mb-5">New Habit</h2>
        <form onSubmit=${handleSubmit} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-600 mb-1">Habit name</label>
            <input
              ref=${inputRef}
              type="text"
              value=${name}
              onChange=${(e) => setName(e.target.value)}
              placeholder="e.g. Morning run"
              maxLength="60"
              className="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-600 mb-1">Time window</label>
            <div className="flex items-center gap-2">
              <input type="time" value=${startTime} onChange=${(e) => setStartTime(e.target.value)}
                className="flex-1 rounded-xl border border-gray-200 px-3 py-2.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-300" />
              <span className="text-gray-400 text-sm">to</span>
              <input type="time" value=${endTime} onChange=${(e) => setEndTime(e.target.value)}
                className="flex-1 rounded-xl border border-gray-200 px-3 py-2.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-300" />
            </div>
            ${!timeValid && startTime && endTime && html`
              <p className="text-xs text-red-400 mt-1">End time must be after start time</p>
            `}
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-600 mb-2">Color</label>
            <div className="flex gap-2">
              ${COLOR_OPTIONS.map(opt => html`
                <button key=${opt.key} type="button" onClick=${() => setColor(opt.key)}
                  className=${`w-8 h-8 rounded-full ${opt.bg} transition-all ${color === opt.key ? `ring-2 ring-offset-2 ${opt.ring} scale-110` : 'hover:scale-105'}`}
                />
              `)}
            </div>
          </div>
          <div className="flex gap-2 pt-2">
            <button type="button" onClick=${onClose}
              className="flex-1 rounded-xl border border-gray-200 py-2.5 text-sm font-medium text-gray-500 hover:bg-gray-50 transition-colors">
              Cancel
            </button>
            <button type="submit" disabled=${!canSubmit}
              className="flex-1 rounded-xl bg-gray-900 py-2.5 text-sm font-medium text-white hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
              Add Habit
            </button>
          </div>
        </form>
      </div>
    </div>
  `
}

// ── DonutChart ────────────────────────────────────────────────────────────────
const SIZE = 160, STROKE = 24, R = (SIZE - STROKE) / 2
const CIRC = 2 * Math.PI * R, CENTER = SIZE / 2, GAP = 5

function DonutChart({ habits }) {
  if (!habits.length) return null

  // Group same-name habits, accumulate total time across all completions
  const groupMap = new Map()
  habits.forEach(h => {
    const key = h.name.toLowerCase()
    const mins = getDurationMinutes(h) * h.completions.length
    if (groupMap.has(key)) {
      const g = groupMap.get(key)
      g.totalMins += mins
    } else {
      groupMap.set(key, { name: h.name, color: h.color, totalMins: mins })
    }
  })
  const groups = Array.from(groupMap.values())

  const grandTotal = groups.reduce((a, g) => a + g.totalMins, 0)
  const segLen = (g) => grandTotal > 0 ? (g.totalMins / grandTotal) * CIRC : CIRC / groups.length

  let acc = 0
  const segs = groups.map(g => {
    const len = segLen(g)
    const startAngle = -90 + (acc / CIRC) * 360
    const dash = Math.max(0, len - GAP)
    acc += len
    return { ...g, startAngle, dash }
  })

  return html`
    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mt-6">
      <h2 className="text-sm font-medium text-gray-500 mb-5">Total Time Breakdown</h2>
      <div className="flex items-center gap-8">
        <div className="relative flex-shrink-0">
          <svg width=${SIZE} height=${SIZE}>
            <circle cx=${CENTER} cy=${CENTER} r=${R} fill="none" stroke="#f3f4f6" strokeWidth=${STROKE} />
            ${segs.map(({ color, dash, startAngle }, i) => html`
              <circle key=${i}
                cx=${CENTER} cy=${CENTER} r=${R}
                fill="none"
                strokeWidth=${STROKE}
                strokeLinecap="butt"
                strokeDasharray=${`${dash} ${CIRC - dash}`}
                strokeDashoffset=${0}
                transform=${`rotate(${startAngle} ${CENTER} ${CENTER})`}
                style=${{ stroke: COLOR_HEX[color] ?? '#6b7280' }}
              />
            `)}
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <span className="text-lg font-bold text-gray-800">${formatDuration(grandTotal) || '—'}</span>
            <span className="text-xs text-gray-400">total</span>
          </div>
        </div>
        <div className="flex-1 space-y-2.5 min-w-0">
          ${segs.map(({ name, color, totalMins }) => html`
            <div key=${name} className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full flex-shrink-0"
                style=${{ backgroundColor: COLOR_HEX[color] ?? '#6b7280' }} />
              <span className="text-sm truncate flex-1 text-gray-700 font-medium">${name}</span>
              ${totalMins > 0 && html`<span className="text-xs text-gray-400 flex-shrink-0">${formatDuration(totalMins)}</span>`}
            </div>
          `)}
          ${grandTotal > 0 && html`
            <p className="text-xs text-gray-400 pt-1 border-t border-gray-100">
              ${formatDuration(grandTotal)} across all time
            </p>
          `}
        </div>
      </div>
    </div>
  `
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const { habits, addHabit, deleteHabit, toggleCompletion, clearAll } = useHabits()
  const [showModal, setShowModal] = useState(false)

  const handleAdd = (name, color, startTime, endTime) => {
    addHabit(name, color, startTime, endTime)
    setShowModal(false)
  }

  const handleClearAll = () => {
    if (habits.length && window.confirm('Remove all habits? This cannot be undone.')) clearAll()
  }

  return html`
    <div className="min-h-screen bg-gray-50">
      <div className="max-w-xl mx-auto px-4 py-10">

        <div className="flex items-center justify-between mb-8">
          <div>
            <h1 className="text-2xl font-bold text-gray-900">Habit Tracker</h1>
            <p className="text-sm text-gray-400 mt-0.5">
              ${new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
            </p>
          </div>
          <div className="flex items-center gap-2">
            ${habits.length > 0 && html`
              <button onClick=${handleClearAll}
                className="text-sm font-medium text-gray-400 hover:text-red-500 hover:bg-red-50 px-3 py-2 rounded-xl transition-colors">
                Clear All
              </button>
            `}
            <button onClick=${() => setShowModal(true)}
              className="flex items-center gap-1.5 bg-gray-900 text-white text-sm font-medium px-4 py-2 rounded-xl hover:bg-gray-700 transition-colors">
              <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                <path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" />
              </svg>
              Add Habit
            </button>
          </div>
        </div>

        ${habits.length > 0 && html`<${Dashboard} habits=${habits} />`}
        ${habits.length > 0 && html`<${DonutChart} habits=${habits} />`}

        ${habits.length === 0
          ? html`
            <div className="text-center py-20 text-gray-400">
              <p className="text-5xl mb-4">🌱</p>
              <p className="font-medium text-gray-500">No habits yet</p>
              <p className="text-sm mt-1">Add your first habit to get started</p>
              <button onClick=${() => setShowModal(true)}
                className="mt-5 inline-flex items-center gap-1.5 bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-xl hover:bg-gray-700 transition-colors">
                <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" />
                </svg>
                Add your first habit
              </button>
            </div>
          `
          : html`
            <div className="space-y-3 mt-6">
              ${habits.map(habit => html`
                <${HabitCard} key=${habit.id} habit=${habit} onToggle=${toggleCompletion} onDelete=${deleteHabit} />
              `)}
            </div>
          `
        }
      </div>

      ${showModal && html`<${AddHabitModal} habits=${habits} onAdd=${handleAdd} onClose=${() => setShowModal(false)} />`}
    </div>
  `
}

// ── mount ─────────────────────────────────────────────────────────────────────
createRoot(document.getElementById('root')).render(html`<${App}/>`)
</script>
</body>
</html>
