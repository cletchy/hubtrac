<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>

  <script>tailwind.config = {}</script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Import map: resolves bare specifiers for the module script below -->
  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client",
      "htm":              "https://esm.sh/htm@3"
    }
  }
  </script>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement, useState, useCallback, useEffect, useRef } from 'react'
import { createRoot } from 'react-dom/client'
import htm from 'htm'
const html = htm.bind(createElement)

// в”Ђв”Ђ helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2)
const todayStr = () => new Date().toISOString().slice(0, 10)

function downloadCSV(habits) {
  const headers = ['Name','Date Added','Color','Duration (min)','Total Completions','Current Streak','Completion Dates']
  const rows = habits.map(h => [
    `"${h.name.replace(/"/g, '""')}"`,
    h.createdAt ? h.createdAt.slice(0, 10) : '',
    h.color,
    getDurationMinutes(h),
    h.completions.length,
    getStreak(h),
    `"${[...h.completions].sort().join(', ')}"`
  ])
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n')
  const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }))
  const a = Object.assign(document.createElement('a'), { href: url, download: `habits-${todayStr()}.csv` })
  a.click()
  URL.revokeObjectURL(url)
}

// в”Ђв”Ђ color config в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Palette from Adobe Color theme + complementary additions
const COLOR_OPTIONS = [
  { key: 'olive',  hex: '#95C92C' }, // palette
  { key: 'lime',   hex: '#B5E655' }, // palette
  { key: 'teal',   hex: '#4CB6C2' }, // palette
  { key: 'sage',   hex: '#7FC7BD' }, // palette
  { key: 'amber',  hex: '#D4A017' }, // complementary warm
  { key: 'coral',  hex: '#E07B54' }, // complementary warm
  { key: 'forest', hex: '#3A7D44' }, // complementary deep green
]

const getHex = (key) => key?.startsWith('#') ? key : (COLOR_OPTIONS.find(c => c.key === key) ?? COLOR_OPTIONS[0]).hex

const hexToRgba = (hex, alpha) => {
  const [r, g, b] = [1, 3, 5].map(i => parseInt(hex.slice(i, i + 2), 16))
  return `rgba(${r},${g},${b},${alpha})`
}

// в”Ђв”Ђ duration helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Common quick-pick durations (minutes)
const DURATION_PRESETS = [5, 10, 15, 30, 45, 60, 90, 120]

function getDurationMinutes(habit) {
  // New habits store duration directly; fall back to legacy start/end times
  if (typeof habit.duration === 'number') return habit.duration > 0 ? habit.duration : 0
  if (!habit.startTime || !habit.endTime) return 0
  const [sh, sm] = habit.startTime.split(':').map(Number)
  const [eh, em] = habit.endTime.split(':').map(Number)
  const diff = eh * 60 + em - (sh * 60 + sm)
  return diff > 0 ? diff : 0
}

function formatDuration(minutes) {
  if (!minutes) return ''
  const h = Math.floor(minutes / 60), m = minutes % 60
  if (!h) return `${m}m`
  if (!m) return `${h}h`
  return `${h}h ${m}m`
}

// в”Ђв”Ђ streak helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function getStreak(habit) {
  const set = new Set(habit.completions)
  const cursor = new Date()
  if (!set.has(todayStr())) cursor.setDate(cursor.getDate() - 1)
  let streak = 0
  while (true) {
    const d = cursor.toISOString().slice(0, 10)
    if (!set.has(d)) break
    streak++
    cursor.setDate(cursor.getDate() - 1)
  }
  return streak
}

const isCompletedToday = (habit) => habit.completions.includes(todayStr())

// в”Ђв”Ђ localStorage в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const STORAGE_KEY = 'habit-tracker-habits'
const loadHabits = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]') } catch { return [] } }
const saveHabits = (h) => localStorage.setItem(STORAGE_KEY, JSON.stringify(h))

// в”Ђв”Ђ useHabits hook в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function useHabits() {
  const [habits, setHabits] = useState(loadHabits)

  const update = useCallback((next) => { setHabits(next); saveHabits(next) }, [])

  const addHabit = useCallback((name, color, duration) => {
    const cleanName = name.trim()
    const existing = habits.find(h => h.name.toLowerCase() === cleanName.toLowerCase())
    if (existing) {
      update(habits.map(h => h.id !== existing.id ? h : {
        ...h,
        duration: getDurationMinutes(h) + (Number.isFinite(duration) ? duration : 0)
      }))
      return
    }
    update([...habits, { id: uid(), name: cleanName, color, duration, createdAt: new Date().toISOString(), completions: [] }])
  }, [habits, update])

  const deleteHabit = useCallback((id) => update(habits.filter(h => h.id !== id)), [habits, update])

  const toggleCompletion = useCallback((id) => {
    const today = todayStr()
    update(habits.map(h => h.id !== id ? h : {
      ...h,
      completions: h.completions.includes(today)
        ? h.completions.filter(d => d !== today)
        : [...h.completions, today]
    }))
  }, [habits, update])

  const changeColor = useCallback((id, color) => {
    update(habits.map(h => h.id !== id ? h : { ...h, color }))
  }, [habits, update])

  // Update colour and/or duration of an existing habit
  const updateHabit = useCallback((id, { color, duration }) => {
    update(habits.map(h => h.id !== id ? h : {
      ...h,
      ...(color !== undefined ? { color } : {}),
      ...(Number.isFinite(duration) ? { duration } : {}),
    }))
  }, [habits, update])

  const clearAll = useCallback(() => update([]), [update])

  return { habits, addHabit, deleteHabit, toggleCompletion, changeColor, updateHabit, clearAll }
}

// в”Ђв”Ђ StatCard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function StatCard({ label, value, sub, icon }) {
  return html`
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-2.5 sm:p-5">
      <p className="text-xs sm:text-sm text-gray-500 mb-0.5 truncate">${label}</p>
      <p className="text-xl sm:text-3xl font-bold text-gray-800">
        ${icon && html`<span className="mr-0.5">${icon}</span>`}${value}
      </p>
      <p className="text-xs text-gray-400 mt-0.5 hidden sm:block">${sub}</p>
    </div>
  `
}

// в”Ђв”Ђ Dashboard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function Dashboard({ habits }) {
  const total = habits.length
  const doneCount = habits.filter(isCompletedToday).length
  const bestStreak = habits.reduce((m, h) => Math.max(m, getStreak(h)), 0)
  const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0
  return html`
    <div className="grid grid-cols-3 gap-2 sm:gap-4 mb-8">
      <${StatCard} label="Total Habits" value=${total} sub="being tracked" />
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-2.5 sm:p-5">
        <p className="text-xs sm:text-sm text-gray-500 mb-0.5 truncate">Completed Today</p>
        <p className="text-xl sm:text-3xl font-bold text-gray-800">
          ${doneCount}<span className="text-base sm:text-lg font-normal text-gray-400"> / ${total}</span>
        </p>
        <div className="mt-2 h-1.5 sm:h-2 bg-gray-100 rounded-full overflow-hidden">
          <div className="h-full bg-emerald-400 rounded-full transition-all duration-500" style=${{ width: `${pct}%` }} />
        </div>
        <p className="text-xs text-gray-400 mt-0.5 hidden sm:block">${pct}% done</p>
      </div>
      <${StatCard} label="Best Streak" value=${bestStreak} sub=${bestStreak === 1 ? 'day' : 'days'} icon="рџ”Ґ" />
    </div>
  `
}

// в”Ђв”Ђ HabitCard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function HabitCard({ habit, onToggle, onDelete, onEdit }) {
  const hex = getHex(habit.color)
  const streak = getStreak(habit)
  const done = isCompletedToday(habit)
  const dur = getDurationMinutes(habit)
  const durLabel = formatDuration(dur)
  return html`
    <div className=${`relative flex items-center gap-4 rounded-2xl border border-gray-100 shadow-sm overflow-hidden bg-white p-4 transition-all ${done ? 'opacity-90' : ''}`}>
      <div className="absolute left-0 top-0 bottom-0 w-1.5" style=${{ backgroundColor: hex }} />
      <button
        onClick=${() => onToggle(habit.id)}
        className=${`ml-2 flex-shrink-0 w-10 h-10 rounded-full border-2 flex items-center justify-center transition-all ${done ? 'border-transparent text-white' : 'border-gray-300 hover:border-gray-400 bg-white text-transparent'}`}
        style=${done ? { backgroundColor: hex } : {}}
      >
        <svg className="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
          <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
        </svg>
      </button>
      <div className="flex-1 min-w-0">
        <p className=${`font-semibold text-gray-800 truncate ${done ? 'line-through text-gray-400' : ''}`}>
          ${habit.name}
        </p>
        <div className="flex items-center gap-2 flex-wrap mt-1">
          ${durLabel && html`
            <span className="inline-flex items-center gap-1 text-xs text-gray-400">
              <svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clipRule="evenodd" />
              </svg>
              ${durLabel}
            </span>
          `}
          ${streak > 0 && html`
            <span className="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full text-gray-700"
              style=${{ backgroundColor: hexToRgba(hex, 0.18) }}>
              рџ”Ґ ${streak} day${streak !== 1 ? 's' : ''}
            </span>
          `}
          ${streak === 0 && !durLabel && html`
            <span className="text-xs text-gray-400">Start your streak today</span>
          `}
        </div>
      </div>
      <button
        onClick=${() => onEdit(habit)}
        title="Edit habit"
        aria-label="Edit habit"
        className="flex-shrink-0 flex items-center gap-1 text-xs font-medium text-gray-500 hover:text-gray-800 hover:bg-gray-100 px-2.5 py-1.5 rounded-lg transition-colors"
      >
        <svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z" />
          <path fillRule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clipRule="evenodd" />
        </svg>
        <span className="hidden sm:inline">Edit</span>
      </button>
      <button
        onClick=${() => onDelete(habit.id)}
        title="Remove habit"
        aria-label="Remove habit"
        className="flex-shrink-0 flex items-center gap-1 text-xs font-medium text-gray-400 hover:text-red-500 hover:bg-red-50 px-2.5 py-1.5 rounded-lg transition-colors"
      >
        <svg className="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" />
        </svg>
        <span className="hidden sm:inline">Remove</span>
      </button>
    </div>
  `
}

// в”Ђв”Ђ AddHabitModal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function AddHabitModal({ habits, onAdd, onClose }) {
  const [name, setName] = useState('')
  const [color, setColor] = useState('teal')
  const [duration, setDuration] = useState(30)
  const inputRef = useRef(null)
  const colorInputRef = useRef(null)
  useEffect(() => { inputRef.current?.focus() }, [])
  const isCustomColor = color?.startsWith('#')

  // Auto-match color when name matches an existing habit
  useEffect(() => {
    const match = habits.find(h => h.name.toLowerCase() === name.trim().toLowerCase())
    if (match) setColor(match.color)
  }, [name, habits])
  const durationValid = Number.isFinite(duration) && duration > 0
  const canSubmit = name.trim() && durationValid
  const totalMins = Number.isFinite(duration) ? duration : 0
  const selHours = Math.floor(totalMins / 60)
  const selMins = totalMins % 60
  const HOUR_OPTIONS = Array.from({ length: 13 }, (_, i) => i)
  const MIN_OPTIONS = Array.from({ length: 12 }, (_, i) => i * 5)

  function handleSubmit(e) {
    e.preventDefault()
    if (!canSubmit) return
    onAdd(name.trim(), color, duration)
  }

  return html`
    <div
      className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
      onClick=${(e) => { if (e.target === e.currentTarget) onClose() }}
    >
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 p-6">
        <h2 className="text-lg font-semibold text-gray-800 mb-5">New Habit</h2>
        <form onSubmit=${handleSubmit} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-600 mb-1">Habit name</label>
            <input
              ref=${inputRef}
              type="text"
              value=${name}
              onChange=${(e) => setName(e.target.value)}
              placeholder="e.g. Morning run"
              maxLength="60"
              className="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-600 mb-2">Duration</label>
            <div className="flex items-center gap-2">
              <select
                value=${selHours}
                onChange=${(e) => setDuration(parseInt(e.target.value, 10) * 60 + selMins)}
                className="flex-1 rounded-xl border border-gray-200 px-3 py-2.5 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-300">
                ${HOUR_OPTIONS.map(h => html`<option key=${h} value=${h}>${h} hr</option>`)}
              </select>
              <select
                value=${selMins}
                onChange=${(e) => setDuration(selHours * 60 + parseInt(e.target.value, 10))}
                className="flex-1 rounded-xl border border-gray-200 px-3 py-2.5 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-300">
                ${MIN_OPTIONS.map(m => html`<option key=${m} value=${m}>${m} min</option>`)}
              </select>
            </div>
            ${!durationValid && html`
              <p className="text-xs text-red-400 mt-1">Enter a duration of at least 1 minute</p>
            `}
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-600 mb-2">Color</label>
            <div className="flex flex-wrap gap-2 items-center">
              ${COLOR_OPTIONS.map(opt => html`
                <button key=${opt.key} type="button" onClick=${() => setColor(opt.key)}
                  className=${`w-8 h-8 rounded-full transition-all ${color === opt.key ? 'scale-110' : 'hover:scale-105'}`}
                  style=${{ backgroundColor: opt.hex, boxShadow: color === opt.key ? `0 0 0 2px #fff, 0 0 0 4px ${opt.hex}` : 'none' }}
                />
              `)}
              <button type="button" onClick=${() => colorInputRef.current?.click()}
                title="Custom color"
                className=${`w-8 h-8 rounded-full transition-all flex items-center justify-center ${isCustomColor ? 'scale-110' : 'border-2 border-dashed border-gray-300 hover:border-gray-400 hover:scale-105'}`}
                style=${isCustomColor ? { backgroundColor: color, boxShadow: `0 0 0 2px #fff, 0 0 0 4px ${color}` } : {}}
              >
                ${!isCustomColor && html`
                  <svg className="w-4 h-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" />
                  </svg>
                `}
              </button>
              <input ref=${colorInputRef} type="color"
                className="sr-only"
                value=${isCustomColor ? color : '#4CB6C2'}
                onInput=${(e) => setColor(e.target.value)}
              />
            </div>
          </div>
          <div className="flex gap-2 pt-2">
            <button type="button" onClick=${onClose}
              className="flex-1 rounded-xl border border-gray-200 py-2.5 text-sm font-medium text-gray-500 hover:bg-gray-50 transition-colors">
              Cancel
            </button>
            <button type="submit" disabled=${!canSubmit}
              className="flex-1 rounded-xl bg-gray-900 py-2.5 text-sm font-medium text-white hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
              Add Habit
            </button>
          </div>
        </form>
      </div>
    </div>
  `
}

// в”Ђв”Ђ EditHabitModal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function EditHabitModal({ habit, onSave, onClose }) {
  const [color, setColor] = useState(habit.color)
  const [add, setAdd] = useState(0) // minutes to add to the existing duration
  const colorInputRef = useRef(null)
  const isCustomColor = color?.startsWith('#')

  const current = getDurationMinutes(habit)
  const addMins = Number.isFinite(add) ? add : 0
  const newTotal = current + addMins
  const addHours = Math.floor(addMins / 60)
  const addRemMins = addMins % 60
  const HOUR_OPTIONS = Array.from({ length: 13 }, (_, i) => i)
  const MIN_OPTIONS = Array.from({ length: 12 }, (_, i) => i * 5)

  function handleSubmit(e) {
    e.preventDefault()
    onSave(habit.id, { color, duration: newTotal })
  }

  return html`
    <div
      className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-sm p-4"
      onClick=${(e) => { if (e.target === e.currentTarget) onClose() }}
    >
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
        <h2 className="text-lg font-semibold text-gray-800 mb-1">Edit Habit</h2>
        <p className="text-sm text-gray-400 mb-5 truncate">${habit.name}</p>
        <form onSubmit=${handleSubmit} className="space-y-4">
          <div>
            <div className="flex items-baseline justify-between mb-2">
              <label className="text-sm font-medium text-gray-600">Add time</label>
              <span className="text-xs text-gray-400">Current: ${formatDuration(current) || '0m'}</span>
            </div>
            <div className="flex items-center gap-2">
              <select
                value=${addHours}
                onChange=${(e) => setAdd(parseInt(e.target.value, 10) * 60 + addRemMins)}
                className="flex-1 rounded-xl border border-gray-200 px-3 py-2.5 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-300">
                ${HOUR_OPTIONS.map(h => html`<option key=${h} value=${h}>${h} hr</option>`)}
              </select>
              <select
                value=${addRemMins}
                onChange=${(e) => setAdd(addHours * 60 + parseInt(e.target.value, 10))}
                className="flex-1 rounded-xl border border-gray-200 px-3 py-2.5 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-300">
                ${MIN_OPTIONS.map(m => html`<option key=${m} value=${m}>${m} min</option>`)}
              </select>
            </div>
            <p className="text-xs text-gray-500 mt-2">
              ${addMins > 0
                ? html`New total: <span className="font-semibold text-gray-700">${formatDuration(newTotal)}</span>`
                : html`<span className="text-gray-400">Pick an amount to add to the current duration</span>`}
            </p>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-600 mb-2">Colour</label>
            <div className="flex flex-wrap gap-2 items-center">
              ${COLOR_OPTIONS.map(opt => html`
                <button key=${opt.key} type="button" onClick=${() => setColor(opt.key)}
                  className=${`w-8 h-8 rounded-full transition-all ${color === opt.key ? 'scale-110' : 'hover:scale-105'}`}
                  style=${{ backgroundColor: opt.hex, boxShadow: color === opt.key ? `0 0 0 2px #fff, 0 0 0 4px ${opt.hex}` : 'none' }}
                />
              `)}
              <button type="button" onClick=${() => colorInputRef.current?.click()}
                title="Custom colour"
                className=${`w-8 h-8 rounded-full transition-all flex items-center justify-center ${isCustomColor ? 'scale-110' : 'border-2 border-dashed border-gray-300 hover:border-gray-400 hover:scale-105'}`}
                style=${isCustomColor ? { backgroundColor: color, boxShadow: `0 0 0 2px #fff, 0 0 0 4px ${color}` } : {}}
              >
                ${!isCustomColor && html`
                  <svg className="w-4 h-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" />
                  </svg>
                `}
              </button>
              <input ref=${colorInputRef} type="color"
                className="sr-only"
                value=${isCustomColor ? color : '#4CB6C2'}
                onInput=${(e) => setColor(e.target.value)}
              />
            </div>
          </div>
          <div className="flex gap-2 pt-2">
            <button type="button" onClick=${onClose}
              className="flex-1 rounded-xl border border-gray-200 py-2.5 text-sm font-medium text-gray-500 hover:bg-gray-50 transition-colors">
              Cancel
            </button>
            <button type="submit"
              className="flex-1 rounded-xl bg-gray-900 py-2.5 text-sm font-medium text-white hover:bg-gray-700 transition-colors">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>
  `
}

// в”Ђв”Ђ DonutChart в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const SIZE = 160, STROKE = 24, R = (SIZE - STROKE) / 2
const CIRC = 2 * Math.PI * R, CENTER = SIZE / 2, GAP = 5

function DonutChart({ habits }) {
  if (!habits.length) return null

  // Group same-name habits, accumulate total time across all completions
  const groupMap = new Map()
  habits.forEach(h => {
    const key = h.name.toLowerCase()
    const mins = getDurationMinutes(h) * h.completions.length
    if (groupMap.has(key)) {
      const g = groupMap.get(key)
      g.totalMins += mins
    } else {
      groupMap.set(key, { name: h.name, color: h.color, totalMins: mins })
    }
  })
  const groups = Array.from(groupMap.values())

  const grandTotal = groups.reduce((a, g) => a + g.totalMins, 0)
  const segLen = (g) => grandTotal > 0 ? (g.totalMins / grandTotal) * CIRC : CIRC / groups.length

  let acc = 0
  const segs = groups.map(g => {
    const len = segLen(g)
    const startAngle = -90 + (acc / CIRC) * 360
    const dash = Math.max(0, len - GAP)
    acc += len
    return { ...g, startAngle, dash }
  })

  return html`
    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mt-6">
      <h2 className="text-sm font-medium text-gray-500 mb-5">Total Time Breakdown</h2>
      <div className="flex items-center gap-8">
        <div className="relative flex-shrink-0">
          <svg width=${SIZE} height=${SIZE}>
            <circle cx=${CENTER} cy=${CENTER} r=${R} fill="none" stroke="#f3f4f6" strokeWidth=${STROKE} />
            ${segs.map(({ color, dash, startAngle }, i) => html`
              <circle key=${i}
                cx=${CENTER} cy=${CENTER} r=${R}
                fill="none"
                strokeWidth=${STROKE}
                strokeLinecap="butt"
                strokeDasharray=${`${dash} ${CIRC - dash}`}
                strokeDashoffset=${0}
                transform=${`rotate(${startAngle} ${CENTER} ${CENTER})`}
                style=${{ stroke: getHex(color) }}
              />
            `)}
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <span className="text-lg font-bold text-gray-800">${formatDuration(grandTotal) || 'вЂ”'}</span>
            <span className="text-xs text-gray-400">total</span>
          </div>
        </div>
        <div className="flex-1 space-y-2.5 min-w-0">
          ${segs.map(({ name, color, totalMins }) => html`
            <div key=${name} className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full flex-shrink-0"
                style=${{ backgroundColor: getHex(color) }} />
              <span className="text-sm truncate flex-1 text-gray-700 font-medium">${name}</span>
              ${totalMins > 0 && html`<span className="text-xs text-gray-400 flex-shrink-0">${formatDuration(totalMins)}</span>`}
            </div>
          `)}
          ${grandTotal > 0 && html`
            <p className="text-xs text-gray-400 pt-1 border-t border-gray-100">
              ${formatDuration(grandTotal)} across all time
            </p>
          `}
        </div>
      </div>
    </div>
  `
}

// в”Ђв”Ђ App в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function App() {
  const { habits, addHabit, deleteHabit, toggleCompletion, updateHabit, clearAll } = useHabits()
  const [showModal, setShowModal] = useState(false)
  const [editingId, setEditingId] = useState(null)
  const editingHabit = habits.find(h => h.id === editingId) || null

  const handleAdd = (name, color, duration) => {
    addHabit(name, color, duration)
    setShowModal(false)
  }

  const handleSaveEdit = (id, changes) => {
    updateHabit(id, changes)
    setEditingId(null)
  }

  const handleClearAll = () => {
    if (habits.length && window.confirm('Remove all habits? This cannot be undone.')) clearAll()
  }

  return html`
    <div className="min-h-screen bg-gray-50">
      <div className="max-w-xl mx-auto px-4 py-10">

        <div className="flex items-center justify-between mb-8">
          <div>
            <h1 className="text-2xl font-bold text-gray-900">Habit Tracker</h1>
            <p className="text-sm text-gray-400 mt-0.5">
              ${new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
            </p>
          </div>
          <div className="flex items-center gap-2">
            ${habits.length > 0 && html`
              <button onClick=${handleClearAll}
                className="text-sm font-medium text-gray-400 hover:text-red-500 hover:bg-red-50 px-3 py-2 rounded-xl transition-colors">
                Clear All
              </button>
            `}
            <button onClick=${() => setShowModal(true)}
              className="flex items-center gap-1.5 bg-gray-900 text-white text-sm font-medium px-4 py-2 rounded-xl hover:bg-gray-700 transition-colors">
              <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                <path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" />
              </svg>
              Add Habit
            </button>
          </div>
        </div>

        ${habits.length > 0 && html`<${Dashboard} habits=${habits} />`}
        ${habits.length > 0 && html`<${DonutChart} habits=${habits} />`}

        ${habits.length === 0
          ? html`
            <div className="text-center py-20 text-gray-400">
              <p className="text-5xl mb-4">рџЊ±</p>
              <p className="font-medium text-gray-500">No habits yet</p>
              <p className="text-sm mt-1">Add your first habit to get started</p>
              <button onClick=${() => setShowModal(true)}
                className="mt-5 inline-flex items-center gap-1.5 bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-xl hover:bg-gray-700 transition-colors">
                <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" />
                </svg>
                Add your first habit
              </button>
            </div>
          `
          : html`
            <div className="space-y-3 mt-6">
              ${habits.map(habit => html`
                <${HabitCard} key=${habit.id} habit=${habit} onToggle=${toggleCompletion} onDelete=${deleteHabit} onEdit=${(h) => setEditingId(h.id)} />
              `)}
            </div>
          `
        }
      </div>

      ${habits.length > 0 && html`
        <div className="mt-8 flex justify-center pb-6">
          <button onClick=${() => downloadCSV(habits)}
            className="flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-gray-800 bg-white border border-gray-200 hover:border-gray-400 px-6 py-3 rounded-2xl shadow-sm transition-colors">
            <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
              <path fillRule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clipRule="evenodd" />
            </svg>
            Download Data as CSV
          </button>
        </div>
      `}

      ${showModal && html`<${AddHabitModal} habits=${habits} onAdd=${handleAdd} onClose=${() => setShowModal(false)} />`}
      ${editingHabit && html`<${EditHabitModal} habit=${editingHabit} onSave=${handleSaveEdit} onClose=${() => setEditingId(null)} />`}
    </div>
  `
}

// в”Ђв”Ђ mount в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
createRoot(document.getElementById('root')).render(html`<${App}/>`)
</script>
</body>
</html>
